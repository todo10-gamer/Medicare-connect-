<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | MediCare Connect</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div style="text-align:center; margin-bottom:24px;">
        <i class="fas fa-heartbeat" style="font-size:40px; color:var(--primary);"></i>
      </div>

      <h2>Create Account</h2>
      <p class="subtitle">Join MediCare Connect today</p>

      <div id="alertBox" class="alert" style="display:none;"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210" />
        </div>

        <div class="form-group">
          <label for="role">Register As</label>
          <select id="role" required>
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
          </select>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6" />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter password" required />
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
          Create Account
        </button>
      </form>

      <div class="auth-redirect">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name            = document.getElementById("name").value;
      const email           = document.getElementById("email").value;
      const phone           = document.getElementById("phone").value;
      const role            = document.getElementById("role").value;
      const password        = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const btn             = document.getElementById("registerBtn");

      // Client-side validation: passwords must match
      if (password !== confirmPassword) {
        showAlert("Passwords do not match!", "error");
        return;
      }

      btn.textContent = "Creating account...";
      btn.disabled = true;

      try {
        const data = await apiPost("/api/auth/register", { name, email, phone, role, password });

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        showAlert("Account created! Redirecting...", "success");

        setTimeout(() => {
          if (data.user.role === "doctor") window.location.href = "doctor-dashboard.html";
          else                             window.location.href = "patient-dashboard.html";
        }, 1000);

      } catch (error) {
        showAlert(error.message || "Registration failed. Please try again.", "error");
        btn.textContent = "Create Account";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
